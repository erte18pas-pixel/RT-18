<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIM-RT 18 | Pelayanan Digital</title>
    
    <!-- 3 BARIS BARU UNTUK PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0d6efd">
    <link rel="apple-touch-icon" href="icon.png">

    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background-color: #f4f6f9;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
    </style>
</head>
<body>
    
    <!-- GANTI DENGAN LINK GOOGLE APPS SCRIPT BAPAK -->
    <iframe src="https://script.google.com/macros/s/AKfycbwQLwkItAlwZMYjDlQRz-XhRLwd58w7_Pad2qSyDybDFY2XSJiB3gmCGdj290tlNmV3cw/exec"></iframe>

    <!-- SCRIPT BARU UNTUK MENGAKTIFKAN SERVICE WORKER -->
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
            .then(() => console.log("Service Worker Terdaftar! Aplikasi siap diinstal."))
            .catch((error) => console.log("Service Worker Gagal:", error));
        }
    </script>
</body>
</html>
